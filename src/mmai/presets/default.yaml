version: 0
debug_mode: false
backend: local
model_metadata_cache_dir: ".mmai_cache/model_metadata"
trial:
  model_name: openai/gpt-oss-120b
  max_model_len: 10000
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  sampling_params:
    temperature: 0.0
    top_k: 1
    max_tokens: 7500
    repetition_penalty: 1.3
  prompt_files:
    primer: trial.user.primer.txt
    question: trial.user.question.txt
  reasoning_marker: assistantfinal
  boilerplate_marker: "\\n.*Boilerplate.*\\n"
patient:
  model_name: openai/gpt-oss-120b
  max_model_len: 120000
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  chunk_size: 10000
  chunk_overlap: 500
  prompt_margin_tokens: 5000
  sampling_params:
    temperature: 0.0
    top_k: 1
    max_tokens: 7500
    repetition_penalty: 1.2
  prompt_files:
    primer: patient.serial.user.primer.txt
    question: patient.serial.user.question.txt
  reasoning_marker: assistantfinal
  boilerplate_marker: "\\s*Boilerplate\\s*:?\\s*"
  text_token_threshold: 115000
embedding:
  model_path: "ksg-dfci/TrialSpace-0426"
  device: cpu
  prompt_file: embedding.txt
reasonable_match:
  model_name: "ksg-dfci/TrialChecker-0426"
  device: cuda
  prompt_file: reasonable_match_checker_template.txt
  score_cutoff: 0.2
exclusion_criteria:
  model_name: "ksg-dfci/BoilerPlateChecker-0426"
  device: cuda
  prompt_file: exclusion_criteria_checker_template.txt
